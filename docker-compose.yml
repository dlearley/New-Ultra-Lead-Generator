version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ultra-leads-postgres
    environment:
      POSTGRES_USER: ultra_user
      POSTGRES_PASSWORD: ultra_pass
      POSTGRES_DB: ultra_leads
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ultra_user -d ultra_leads"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis (for queues and caching)
  redis:
    image: redis:7-alpine
    container_name: ultra-leads-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # API Application
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ultra-leads-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ultra_user:ultra_pass@postgres:5432/ultra_leads?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-this-in-production}
      CLEARBIT_API_KEY: ${CLEARBIT_API_KEY:-}
      HUNTER_API_KEY: ${HUNTER_API_KEY:-}
      BUILTWITH_API_KEY: ${BUILTWITH_API_KEY:-}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  # Web Application
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ultra-leads-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
